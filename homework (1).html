<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมุดจดการบ้าน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf8f3;
    --paper-2: #f4f1e8;
    --ink: #2a2a2a;
    --ink-soft: #5a5a5a;
    --muted: #9a958a;
    --line: #e8e3d6;
    --line-soft: #efece2;
    --accent: #d97757;
    --accent-soft: #f3ddd0;
    --math: #6b5fa8; --math-bg: #ebe7f5;
    --sci: #5a8c5e;  --sci-bg: #e3ede4;
    --eng: #c08530;  --eng-bg: #f5e9d3;
    --thai: #b8556d; --thai-bg: #f3dde2;
    --soc: #4d8aa8;  --soc-bg: #dde9f0;
    --art: #b56baf;  --art-bg: #efdfee;
    --other: #7a756c;--other-bg: #ebe8df;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    padding: 32px 18px 80px;
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.025) 1px, transparent 0);
    background-size: 22px 22px;
  }
  .container { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px dashed var(--line); }
  .meta-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; justify-content: space-between; margin-bottom: 10px;
  }
  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.4rem; font-weight: 500; line-height: 1.1;
  }
  header h1 em { font-style: italic; color: var(--accent); }
  header .sub { font-size: 0.9rem; color: var(--ink-soft); margin-top: 6px; }

  .top-bar {
    display: flex; justify-content: space-between;
    align-items: center; gap: 12px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .notif-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; color: var(--ink-soft);
    display: flex; align-items: center; gap: 6px;
  }
  .notif-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .notif-pill.on .dot { background: var(--sci); }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    background: var(--ink); color: var(--paper);
    border: none; padding: 9px 16px; border-radius: 999px;
    font-family: inherit; font-size: 0.82rem; font-weight: 500;
    cursor: pointer; transition: transform 0.12s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn.ghost {
    background: transparent; color: var(--ink-soft);
    border: 1px solid var(--line);
  }
  .btn.ghost:hover { background: var(--paper-2); color: var(--ink); }
  .btn.text {
    background: transparent; color: var(--ink-soft);
    padding: 6px 10px; font-size: 0.78rem;
  }
  .btn.text:hover { color: var(--ink); text-decoration: underline; }

  .tabs {
    display: flex; gap: 2px; margin-bottom: 24px;
    border-bottom: 1px solid var(--line); overflow-x: auto;
  }
  .tab {
    background: transparent; border: none; color: var(--muted);
    padding: 10px 14px; font-family: inherit; font-size: 0.85rem;
    font-weight: 500; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s; white-space: nowrap;
  }
  .tab:hover { color: var(--ink-soft); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; margin-left: 4px; color: var(--muted);
  }
  .tab.active .badge { color: var(--accent); }

  .add-form {
    background: #fff; border: 1px solid var(--line);
    border-radius: 12px; padding: 22px; margin-bottom: 28px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.03);
  }
  .add-form-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
  .add-form-head h3 {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem; font-weight: 500;
  }
  .add-form-head .hint { font-size: 0.75rem; color: var(--muted); }
  .field { margin-bottom: 14px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label {
    display: block; font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: var(--muted); margin-bottom: 6px;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  input, select, textarea {
    width: 100%; background: var(--paper); border: 1px solid var(--line);
    border-radius: 8px; color: var(--ink); padding: 10px 12px;
    font-family: inherit; font-size: 0.95rem; transition: border 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent); background: #fff;
  }
  textarea { resize: vertical; min-height: 64px; }

  .list-header {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 14px;
  }
  .list-header h4 {
    font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 500;
  }
  .list-header .count {
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted);
  }

  .task-list { display: flex; flex-direction: column; gap: 10px; }
  .empty { text-align: center; padding: 60px 20px; }
  .empty .icon {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 3rem; color: var(--line); margin-bottom: 8px;
  }
  .empty .text { font-size: 0.9rem; color: var(--ink-soft); }
  .empty .hint { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  .task {
    background: #fff; border: 1px solid var(--line);
    border-radius: 10px; padding: 14px 16px;
    display: flex; gap: 14px; align-items: flex-start;
    transition: border-color 0.15s; position: relative;
  }
  .task:hover { border-color: #d8d2c2; }
  .task.done { background: var(--paper-2); border-color: var(--line-soft); }
  .task.done .task-title { text-decoration: line-through; color: var(--muted); }
  .task.urgent::before, .task.soon::before {
    content: ''; position: absolute;
    left: -1px; top: -1px; bottom: -1px; width: 3px;
    border-radius: 10px 0 0 10px;
  }
  .task.urgent::before { background: var(--accent); }
  .task.soon::before { background: #d4a456; }

  .check {
    width: 20px; height: 20px; border: 1.5px solid var(--line);
    border-radius: 6px; cursor: pointer; flex-shrink: 0; margin-top: 2px;
    background: #fff; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; appearance: none; -webkit-appearance: none;
  }
  .check:hover { border-color: var(--accent); }
  .check:checked { background: var(--accent); border-color: var(--accent); }
  .check:checked::after { content: '✓'; color: #fff; font-size: 0.85rem; font-weight: 700; }

  .task-body { flex: 1; min-width: 0; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 5px; }

  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem; padding: 2px 9px;
    border-radius: 4px; font-weight: 500;
  }
  .chip.math  { background: var(--math-bg);  color: var(--math); }
  .chip.sci   { background: var(--sci-bg);   color: var(--sci); }
  .chip.eng   { background: var(--eng-bg);   color: var(--eng); }
  .chip.thai  { background: var(--thai-bg);  color: var(--thai); }
  .chip.soc   { background: var(--soc-bg);   color: var(--soc); }
  .chip.art   { background: var(--art-bg);   color: var(--art); }
  .chip.other { background: var(--other-bg); color: var(--other); }

  .due { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  .due.urgent { color: var(--accent); font-weight: 600; }
  .due.soon { color: #c08530; }

  .task-title { font-size: 0.98rem; color: var(--ink); margin-bottom: 4px; word-break: break-word; line-height: 1.45; }
  .task-note {
    font-size: 0.85rem; color: var(--ink-soft); word-break: break-word;
    line-height: 1.5; padding-left: 10px; border-left: 2px solid var(--line);
    margin-top: 6px; font-style: italic;
  }
  .delete-btn {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; padding: 4px 6px; font-size: 1rem;
    border-radius: 4px; opacity: 0.3; transition: opacity 0.15s, color 0.15s;
  }
  .task:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--accent); }

  .help {
    font-size: 0.75rem; color: var(--muted); text-align: center;
    margin-top: 32px; padding-top: 20px; border-top: 1px dashed var(--line);
  }

  @media (max-width: 600px) {
    .field-row { grid-template-columns: 1fr; }
    header h1 { font-size: 1.9rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="meta-line">
      <span>ม.4/14 — 1/2569</span>
      <span id="today-date"></span>
    </div>
    <h1>สมุดจด<em>การบ้าน</em></h1>
    <div class="sub">บันทึกสิ่งที่ครูสั่งและเตือนก่อนถึงกำหนด</div>
  </header>

  <div class="top-bar">
    <div class="notif-pill" id="notif-pill">
      <span class="dot"></span>
      <span id="notif-text">ตรวจสอบการแจ้งเตือน...</span>
    </div>
    <div class="btn-row">
      <button class="btn ghost" id="enable-notif">เปิดแจ้งเตือน</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-filter="active">ยังไม่เสร็จ <span class="badge" id="count-active">0</span></button>
    <button class="tab" data-filter="today">วันนี้ <span class="badge" id="count-today">0</span></button>
    <button class="tab" data-filter="week">7 วัน <span class="badge" id="count-week">0</span></button>
    <button class="tab" data-filter="done">เสร็จแล้ว <span class="badge" id="count-done">0</span></button>
    <button class="tab" data-filter="all">ทั้งหมด <span class="badge" id="count-all">0</span></button>
  </div>

  <div class="add-form">
    <div class="add-form-head">
      <h3>เพิ่มงานใหม่</h3>
      <span class="hint">บันทึกสิ่งที่ครูสั่งในคาบ</span>
    </div>
    <div class="field">
      <label>เรื่อง</label>
      <input type="text" id="t-title" placeholder="เช่น แบบฝึกหัดบทที่ 3 ข้อ 1–10">
    </div>
    <div class="field-row field">
      <div>
        <label>วิชา</label>
        <select id="t-subject">
          <option value="math">คณิตศาสตร์</option>
          <option value="sci">วิทยาศาสตร์/ฟิสิกส์</option>
          <option value="eng">ภาษาอังกฤษ</option>
          <option value="thai">ภาษาไทย</option>
          <option value="soc">สังคมศึกษา</option>
          <option value="art">ศิลปะ</option>
          <option value="other">อื่นๆ</option>
        </select>
      </div>
      <div>
        <label>กำหนดส่ง</label>
        <input type="datetime-local" id="t-due">
      </div>
    </div>
    <div class="field">
      <label>หมายเหตุ</label>
      <textarea id="t-note" placeholder="รายละเอียดเพิ่มเติม (ไม่บังคับ)"></textarea>
    </div>
    <button class="btn" id="add-btn">+ บันทึกลงสมุด</button>
  </div>

  <div class="list-header">
    <h4 id="list-title">ยังไม่เสร็จ</h4>
    <span class="count" id="list-count">0 รายการ</span>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="help">ข้อมูลบันทึกในเบราว์เซอร์อัตโนมัติ ไม่หายแม้ปิดหน้าต่าง</div>
</div>

<script>
(function() {
  'use strict';

  var STORAGE_KEY = 'ui_homework_v2';
  var SUBJECT_NAMES = {
    math: 'คณิตศาสตร์', sci: 'วิทยาศาสตร์', eng: 'อังกฤษ',
    thai: 'ภาษาไทย', soc: 'สังคม', art: 'ศิลปะ', other: 'อื่นๆ'
  };
  var FILTER_TITLES = {
    active: 'ยังไม่เสร็จ', today: 'ครบกำหนดวันนี้',
    week: 'ใน 7 วันข้างหน้า', done: 'เสร็จแล้ว', all: 'ทั้งหมด'
  };

  var tasks = [];
  var currentFilter = 'active';

  function loadTasks() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }
  function saveTasks() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {}
  }
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  }
  function pad2(n) { return (n < 10 ? '0' : '') + n; }

  // Date display
  (function() {
    var d = new Date();
    var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    document.getElementById('today-date').textContent =
      d.getDate() + ' ' + months[d.getMonth()] + ' ' + (d.getFullYear() + 543);
  })();

  function addTask() {
    var title = document.getElementById('t-title').value.trim();
    if (!title) { document.getElementById('t-title').focus(); return; }
    tasks.push({
      id: uid(),
      title: title,
      subject: document.getElementById('t-subject').value,
      due: document.getElementById('t-due').value,
      note: document.getElementById('t-note').value.trim(),
      done: false, created: Date.now(), notified: false
    });
    saveTasks();
    document.getElementById('t-title').value = '';
    document.getElementById('t-due').value = '';
    document.getElementById('t-note').value = '';
    render();
  }

  function toggleDone(id) {
    for (var i = 0; i < tasks.length; i++) {
      if (tasks[i].id === id) { tasks[i].done = !tasks[i].done; break; }
    }
    saveTasks(); render();
  }

  function deleteTask(id) {
    if (!confirm('ลบงานนี้?')) return;
    tasks = tasks.filter(function(x) { return x.id !== id; });
    saveTasks(); render();
  }

  function getDueStatus(task) {
    if (!task.due || task.done) return null;
    var now = Date.now();
    var dueMs = new Date(task.due).getTime();
    var diff = dueMs - now;
    if (diff < 0) return { level: 'urgent', text: 'เลยกำหนด' };
    if (diff < 24*60*60*1000) return { level: 'urgent', text: formatDue(task.due) };
    if (diff < 3*24*60*60*1000) return { level: 'soon', text: formatDue(task.due) };
    return { level: '', text: formatDue(task.due) };
  }

  function formatDue(iso) {
    var d = new Date(iso);
    var days = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
    var today = new Date(); today.setHours(0,0,0,0);
    var due = new Date(d); due.setHours(0,0,0,0);
    var dayDiff = Math.round((due - today) / (24*60*60*1000));
    var prefix;
    if (dayDiff === 0) prefix = 'วันนี้';
    else if (dayDiff === 1) prefix = 'พรุ่งนี้';
    else if (dayDiff > 1 && dayDiff < 7) prefix = days[d.getDay()];
    else prefix = d.getDate() + '/' + (d.getMonth()+1);
    return prefix + ' · ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
  }

  function filterTasks() {
    var now = Date.now();
    var todayEnd = new Date(); todayEnd.setHours(23,59,59,999);
    var weekEnd = now + 7*24*60*60*1000;
    return tasks.filter(function(t) {
      if (currentFilter === 'active') return !t.done;
      if (currentFilter === 'done') return t.done;
      if (currentFilter === 'today') return !t.done && t.due && new Date(t.due).getTime() <= todayEnd.getTime();
      if (currentFilter === 'week') return !t.done && t.due && new Date(t.due).getTime() <= weekEnd;
      return true;
    });
  }

  function sortTasks(list) {
    return list.slice().sort(function(a,b) {
      if (a.done !== b.done) return a.done - b.done;
      if (a.due && b.due) return new Date(a.due) - new Date(b.due);
      if (a.due) return -1; if (b.due) return 1;
      return b.created - a.created;
    });
  }

  function render() {
    var list = sortTasks(filterTasks());
    var container = document.getElementById('task-list');
    var now = Date.now();
    var todayEnd = new Date(); todayEnd.setHours(23,59,59,999);

    document.getElementById('count-all').textContent = tasks.length;
    document.getElementById('count-active').textContent = tasks.filter(function(t){return !t.done;}).length;
    document.getElementById('count-done').textContent = tasks.filter(function(t){return t.done;}).length;
    document.getElementById('count-today').textContent = tasks.filter(function(t){
      return !t.done && t.due && new Date(t.due).getTime() <= todayEnd.getTime();
    }).length;
    document.getElementById('count-week').textContent = tasks.filter(function(t){
      return !t.done && t.due && new Date(t.due).getTime() <= now + 7*24*60*60*1000;
    }).length;

    document.getElementById('list-title').textContent = FILTER_TITLES[currentFilter];
    document.getElementById('list-count').textContent = list.length + ' รายการ';
    container.innerHTML = '';

    if (list.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML = '<div class="icon">∅</div><div class="text">หน้านี้ยังว่างอยู่</div><div class="hint">เพิ่มงานแรกข้างบนได้เลย</div>';
      container.appendChild(empty);
      return;
    }

    list.forEach(function(t) {
      var status = getDueStatus(t);
      var lvlClass = t.done ? 'done' : (status ? status.level : '');
      var taskEl = document.createElement('div');
      taskEl.className = 'task ' + lvlClass;

      var checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'check';
      checkbox.checked = t.done;
      (function(id){ checkbox.addEventListener('change', function(){ toggleDone(id); }); })(t.id);

      var body = document.createElement('div');
      body.className = 'task-body';

      var meta = document.createElement('div');
      meta.className = 'task-meta';
      var chip = document.createElement('span');
      chip.className = 'chip ' + t.subject;
      chip.textContent = SUBJECT_NAMES[t.subject];
      meta.appendChild(chip);

      if (t.due && status) {
        var dueEl = document.createElement('span');
        dueEl.className = 'due ' + status.level;
        dueEl.textContent = status.text;
        meta.appendChild(dueEl);
      }

      var titleEl = document.createElement('div');
      titleEl.className = 'task-title';
      titleEl.textContent = t.title;

      body.appendChild(meta);
      body.appendChild(titleEl);

      if (t.note) {
        var noteEl = document.createElement('div');
        noteEl.className = 'task-note';
        noteEl.textContent = t.note;
        body.appendChild(noteEl);
      }

      var delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '×';
      (function(id){ delBtn.addEventListener('click', function(){ deleteTask(id); }); })(t.id);

      taskEl.appendChild(checkbox);
      taskEl.appendChild(body);
      taskEl.appendChild(delBtn);
      container.appendChild(taskEl);
    });
  }

  // Tabs
  var tabBtns = document.querySelectorAll('.tab');
  for (var i = 0; i < tabBtns.length; i++) {
    tabBtns[i].addEventListener('click', function() {
      for (var j = 0; j < tabBtns.length; j++) tabBtns[j].classList.remove('active');
      this.classList.add('active');
      currentFilter = this.getAttribute('data-filter');
      render();
    });
  }

  document.getElementById('add-btn').addEventListener('click', addTask);
  document.getElementById('t-title').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addTask(); }
  });

  // Notifications
  function updateNotifStatus() {
    var pill = document.getElementById('notif-pill');
    var text = document.getElementById('notif-text');
    var btn = document.getElementById('enable-notif');
    if (!('Notification' in window)) {
      text.textContent = 'เบราว์เซอร์ไม่รองรับการแจ้งเตือน';
      btn.style.display = 'none'; return;
    }
    if (Notification.permission === 'granted') {
      pill.classList.add('on');
      text.textContent = 'แจ้งเตือนเปิดอยู่';
      btn.style.display = 'none';
    } else if (Notification.permission === 'denied') {
      text.textContent = 'แจ้งเตือนถูกปิด';
      btn.style.display = 'none';
    } else {
      text.textContent = 'แจ้งเตือนปิดอยู่';
    }
  }

  document.getElementById('enable-notif').addEventListener('click', function() {
    if (!('Notification' in window)) return;
    try {
      var p = Notification.requestPermission();
      if (p && typeof p.then === 'function') p.then(function(){ updateNotifStatus(); });
      else setTimeout(updateNotifStatus, 100);
    } catch(e) { updateNotifStatus(); }
  });

  function checkNotifications() {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    var now = Date.now();
    tasks.forEach(function(t) {
      if (t.done || !t.due || t.notified) return;
      var diff = new Date(t.due).getTime() - now;
      if (diff > 0 && diff < 60*60*1000) {
        try {
          new Notification('ใกล้ถึงกำหนด: ' + SUBJECT_NAMES[t.subject], {
            body: t.title + ' (เหลือไม่ถึง 1 ชั่วโมง)', tag: t.id
          });
          t.notified = true; saveTasks();
        } catch(e) {}
      }
    });
  }

  tasks = loadTasks();
  updateNotifStatus();
  render();
  setInterval(checkNotifications, 60*1000);

})();
</script>
</body>
</html>
